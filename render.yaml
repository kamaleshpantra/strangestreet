# Render.com Blueprint specification
# https://render.com/docs/blueprint-spec

databases:
  - name: strangestreet-db
    plan: free
    databaseName: strangestreet
    user: strangestreet

services:
  - type: web
    name: strangestreet
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:application -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: strangestreet-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: cron
    name: strangestreet-ml-pipeline
    plan: free
    runtime: python
    schedule: "0 * * * *" # Runs at minute 0 past every hour
    buildCommand: pip install -r requirements.txt
    startCommand: python ml/run_pipeline.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: strangestreet-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
