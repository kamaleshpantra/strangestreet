name: Sync to Hugging Face
on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          # This secret must be added to your GitHub repository settings
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://KamaleshPantra:$HF_TOKEN@huggingface.co/spaces/KamaleshPantra/StrangeStreet main
