{% extends "base.html" %}
{% block title %}Create Post — Strange Street{% endblock %}
{% block content %}
<div style="max-width:560px;margin:0 auto;">
  <h1 style="font-family:var(--font-h);font-size:22px;font-weight:700;margin-bottom:20px;letter-spacing:-0.3px;">Create post</h1>

  <div class="card card-p" style="padding:24px;">
    <form action="/posts/create" method="post" enctype="multipart/form-data">
      <div style="margin-bottom:14px;">
        <label class="lbl">Content</label>
        <textarea name="content" class="inp" rows="5" placeholder="What's on your mind?" required></textarea>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
        <div>
          <label class="lbl">Category</label>
          <select name="category" class="inp">
            {% for cat in categories %}
            <option value="{{ cat }}">{{ cat.title() }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="lbl">Post in Zone</label>
          <select name="zone_id" class="inp">
            <option value="">No zone (public)</option>
            {% for zone in zones %}
            <option value="{{ zone.id }}">z/{{ zone.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div style="margin-bottom:14px;">
        <label class="lbl">Attach Media</label>
        <input type="file" name="media" accept="image/*,video/*" class="inp" style="padding:8px;"/>
      </div>

      <!-- Poll -->
      <div style="margin-bottom:14px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <label class="lbl" style="margin:0;">📊 Add a Poll (optional)</label>
        </div>
        <div style="margin-bottom:8px;">
          <input name="poll_question" type="text" class="inp" placeholder="Poll question..." style="font-size:13px;padding:8px 10px;"/>
        </div>
        <input name="poll_options" type="text" class="inp" placeholder="Options separated by commas: Yes, No, Maybe" style="font-size:13px;padding:8px 10px;"/>
        <div style="font-size:11px;color:var(--text3);margin-top:6px;">Leave empty for no poll. Min 2 options.</div>
      </div>

      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;font-size:14px;padding:10px;">
        Publish Post
      </button>
    </form>
  </div>
</div>
{% endblock %}
