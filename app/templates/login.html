{% extends "base.html" %}
{% block title %}Sign in — Strange Street{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 120px);display:flex;align-items:center;justify-content:center;padding:40px 0;">
  <div style="width:100%;max-width:380px;">

    <div style="text-align:center;margin-bottom:28px;">
      <div style="display:flex;justify-content:center;margin-bottom:12px;">
        <div style="font-family:var(--font-h);font-size:32px;font-weight:800;letter-spacing:-1px;line-height:60px;height:60px;display:flex;align-items:center;overflow:visible;">
          <span style="color:var(--red);">S</span>trange Street
        </div>
      </div>
      <h1 style="font-family:var(--font-h);font-size:20px;font-weight:700;letter-spacing:-0.4px;">Welcome back</h1>
      <p style="font-size:13px;color:var(--text3);margin-top:2px;">Sign in to continue your journey</p>
    </div>

    <div class="card card-p" style="padding:28px;">
      {% if error %}
      <div class="alert-err" style="margin-bottom:18px;">{{ error }}</div>
      {% endif %}

      <form action="/auth/login" method="post">
        <div style="margin-bottom:14px;">
          <label class="lbl">Username</label>
          <input name="username" type="text" class="inp" placeholder="your username" required autofocus/>
        </div>
        <div style="margin-bottom:20px;">
          <label class="lbl">Password</label>
          <div style="position:relative;">
            <input name="password" type="password" class="inp" placeholder="your password" required id="login-pass"/>
            <button type="button" onclick="togglePass('login-pass', this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:14px;padding:5px;">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;font-size:14px;padding:10px;">Sign in</button>
      </form>

      <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--text3);">
        New here? <a href="/auth/register" style="color:var(--red2);font-weight:500;">Join the Street</a>
      </div>
    </div>

  </div>
</div>
<script>
function togglePass(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '🔒';
  } else {
    inp.type = 'password';
    btn.textContent = '👁️';
  }
}
</script>
{% endblock %}
